{% extends "_partial.html" %}
{% load static  %}


{% block content %}


    <div class="container w-container">
      {% if latest_archives_list %}
      {% for archives in latest_archives_list %}
      <div class="div-block-2"></div>
      <hr class="rounded">
      <div>
        <div class="columns w-row">
          <div class="w-col w-col-7">
            <div class="rich-text-block-2 w-richtext">
              <h2 id="postTitle">{{ archives.title }}</h2>
              <p>{{ archives.description }}</p>
            </div>
          </div>
          <div class="w-col w-col-5">
            <div><img src="uploads/{{ archives.image_upload }}" loading="lazy" srcset="uploads/{{ archives.image_upload }}" id="post-image"  alt="" class="image-2"></div>
            <div>
              <a href="/{{ archives.link_to }}" class="button-2 w-button">Read More </a>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
      {% else %}
          <p>No archives are available.</p>
      {% endif %}
      <hr class="rounded">
    </div>



{% endblock %}
