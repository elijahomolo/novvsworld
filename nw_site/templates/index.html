<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

  {% if latest_post_list %}
      <ul>
      {% for post in latest_post_list %}
          <h1>{{ post.title }}</h1>
          <p>{{ post.body }}</p>
      {% endfor %}
      </ul>
  {% else %}
      <p>No post are available.</p>
  {% endif %}


</body>
</html>
